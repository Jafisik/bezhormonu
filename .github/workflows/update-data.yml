name: Update gynekologove data

on:
  schedule:
    - cron: '0 * * * *'  # každou hodinu
  workflow_dispatch:      # nebo spustit ručně

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch CSV and convert to JSON
        run: |
          python3 << 'EOF'
          import csv, json, urllib.request, io

          url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQCA690SNbOz6bIiFswpqi9P0VduN5kfXouFWiEhHTgB5B0UX_MFfsj0jzpbsn43i_cI5HbIpDAQaO7/pub?output=csv'

          with urllib.request.urlopen(url) as r:
              content = r.read().decode('utf-8')

          reader = csv.reader(io.StringIO(content))
          rows = list(reader)
          data = [row for row in rows[1:] if any(c.strip() for c in row[:2])]

          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, separators=(',', ':'))

          print(f"Uloženo {len(data)} záznamů")
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "Žádné změny"
          else
            git commit -m "Update data.json"
            git push
          fi
